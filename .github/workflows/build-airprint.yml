name: Build and push AirPrint relay image

on:
  push:
    branches:
      - main
    paths:
      - "configs/airprint/**"
  # Allow a manual trigger (e.g. to force a rebuild on a new brscan4 release)
  workflow_dispatch:
    inputs:
      brscan4_url:
        description: "brscan4 .deb download URL (overrides the repository variable)"
        required: false
        type: string

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/truenas-airprint-relay

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata (tags and labels)
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag every build with the short git SHA for reproducibility
            type=sha,prefix=sha-,format=short
            # Keep 'latest' pointing at the most recent main-branch build
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Resolve the brscan4 URL in order of precedence:
      #   1. workflow_dispatch input (manual override)
      #   2. repository-level variable  vars.BRSCAN4_URL
      # Store it as a masked step output so the URL never appears in plain text.
      - name: Resolve brscan4 URL
        id: brscan4
        env:
          DISPATCH_URL: ${{ inputs.brscan4_url }}
          REPO_VAR_URL: ${{ vars.BRSCAN4_URL }}
        run: |
          URL="${DISPATCH_URL:-${REPO_VAR_URL}}"
          if [ -z "${URL}" ]; then
            echo "ERROR: brscan4 URL is not set." \
                 "Configure it via the repository variable BRSCAN4_URL" \
                 "or pass it as a workflow_dispatch input." >&2
            exit 1
          fi
          echo "url=${URL}" >> "${GITHUB_OUTPUT}"

      - name: Build and push image (linux/amd64)
        uses: docker/build-push-action@v6
        with:
          context: configs/airprint
          file: configs/airprint/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BRSCAN4_URL=${{ steps.brscan4.outputs.url }}
          # Re-use the GitHub Actions cache between runs to speed up rebuilds
          cache-from: type=gha
          cache-to: type=gha,mode=max
